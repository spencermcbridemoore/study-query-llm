name: persistence-contract

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run persistence contract lint
        run: python scripts/check_persistence_contract.py

      - name: Run pipeline foundation tests
        run: pytest tests/pipeline/ -q
