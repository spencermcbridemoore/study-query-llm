name: persistence-contract

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run persistence contract lint
        run: python scripts/check_persistence_contract.py

      - name: Assert EmbeddingVector refs removed
        run: |
          if rg "EmbeddingVector" src panel_app scripts tests --glob "*.py"; then
            echo "Found forbidden EmbeddingVector references."
            exit 1
          fi

      - name: Run pipeline foundation tests (excluding BANK77 e2e)
        run: pytest tests/pipeline/ -q -k "not bank77_pipeline_e2e"

      - name: Run BANK77 structural acceptance e2e
        run: pytest tests/pipeline/test_bank77_pipeline_e2e.py -q
