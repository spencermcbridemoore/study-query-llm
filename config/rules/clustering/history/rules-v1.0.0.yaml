version: "1.0.0"
context_keys: [embedding_dim, n_samples]

global_hygiene:
  random_state: 42
  kmeans:
    n_init: 20
    max_iter: 300
    init: "k-means++"
  hdbscan:
    cluster_selection_method: "eom"
    alpha: 1.0
    min_samples: null
  gmm:
    reg_covar: 1.0e-6
    n_init: 10
    max_iter: 200

adjacency_rules:
  pca:
    n_components_for_downstream:
      hdbscan:
        - input_dim_le: 200
          value: null
        - input_dim_le: 768
          value: 30
        - input_dim_le: 4096
          value: 100
      kmeans:
        - input_dim_le: 200
          value: null
        - input_dim_le: 4096
          value: 100
      gmm:
        - input_dim_le: 200
          value: null
        - input_dim_le: 4096
          value: 100
    hard_cap: "min(value, input_dim, n_samples - 1)"
    skip_when:
      - input_dim_le: 200
  hdbscan:
    metric_when_normalized_upstream: "euclidean"
    metric_otherwise: "cosine"

dataset_constants:
  twenty_newsgroups:
    embedding_dim: 768
    n_samples: 18846
    umap_n_neighbors: 15
    knn_graph_k: 15
    hdbscan_min_cluster_size_default: 50
    dbscan_min_samples: 5

selection_policies:
  "kmeans+silhouette+kneedle":
    base_algorithm: "kmeans"
    k_range: [2, 3, 5, 8, 10, 15, 20, 30, 50]
    selection_metric: "silhouette"
    selection_rule: "kneedle"
  "gmm+bic+argmin":
    base_algorithm: "gmm"
    k_range: [2, 3, 5, 8, 10, 15, 20, 30, 50]
    selection_metric: "bic"
    selection_rule: "argmin"
